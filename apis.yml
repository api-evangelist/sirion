name: Sirion
kind: company
description: Sirion (SirionLabs) is an AI-native enterprise Contract Lifecycle
  Management (CLM) platform. SirionOne manages the full agreement lifecycle -
  authoring, negotiation, e-signature, a searchable contract repository, metadata
  and clause extraction, obligation and performance management, and supplier /
  counterparty governance. The platform exposes REST "Business API & Integrations"
  capabilities plus pre-built connectors (Salesforce, SAP Ariba, SAP S/4HANA,
  DocuSign, iPaaS) and configurable webhooks, secured with OAuth 2.0 client
  credentials. API access is enterprise / contract-gated - credentials are
  provisioned per tenant and the API reference is available to authenticated
  Sirion users. Endpoint paths and schemas in this entry are MODELED from public
  product references, not copied from a public reference document.
