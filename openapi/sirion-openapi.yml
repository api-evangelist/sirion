openapi: 3.0.3
info:
  title: Sirion CLM API (Modeled)
  description: >-
    IMPORTANT - MODELED DOCUMENT. This OpenAPI definition is a MODELED
    representation of the Sirion (SirionLabs) CLM "Business API & Integrations"
    surface. It is NOT copied from an official public reference. Sirion's API
    reference is available only to authenticated Sirion users (via My Account ->
    Resources -> Help Guide in the tenant application, and at docs.sirion.ai
    behind login), and API access is provisioned per enterprise tenant.


    What is publicly CONFIRMED and reflected here: (1) SirionOne is RESTful and
    "any activity possible in the web application is possible via the APIs";
    (2) authentication uses OAuth 2.0 client credentials for Sirion B2B APIs
    (an OAuth Client Id and OAuth Client Secret generated by a tenant admin
    under Admin 2.0 -> Business API & Integrations / OAuth Client Setup);
    (3) Sirion supports configurable outbound webhooks with field-based
    filtering and event-based, asynchronous processing; (4) core CLM entities
    include contracts, contract requests (CDRs), metadata and clauses,
    obligations, and suppliers / counterparties.


    What is MODELED and NOT publicly confirmable: all endpoint paths, the exact
    request/response schemas, the OAuth token URL, and the per-tenant host. The
    base server below uses a `tenant` variable on the confirmed product domain
    sirioncloud.com; substitute your organization's actual Sirion host. Do not
    treat these paths as authoritative - obtain the real reference from your
    Sirion tenant.
  version: '1.0-modeled'
  contact:
    name: SirionLabs
    url: https://www.sirion.ai
servers:
  - url: https://{tenant}.sirioncloud.com
    description: >-
      Per-tenant SirionOne instance (MODELED host pattern on the confirmed
      product domain sirioncloud.com). Replace {tenant} with your organization's
      Sirion subdomain. The exact API path prefix is provisioned per tenant.
    variables:
      tenant:
        default: your-org
        description: Your organization's Sirion tenant subdomain.
security:
  - oauth2ClientCredentials: []
tags:
  - name: Contracts
    description: Executed contracts / agreements in the SirionOne repository (MODELED).
  - name: Contract Requests
    description: Contract Requests (CDRs) that drive intake and authoring (MODELED).
  - name: Metadata & Clauses
    description: Contract metadata fields and AI-extracted clauses (MODELED).
  - name: Obligations
    description: Contractual obligations and performance tracking (MODELED).
  - name: Suppliers
    description: Suppliers and counterparties linked to contracts (MODELED).
  - name: Webhooks
    description: Outbound webhook subscriptions for event notifications (MODELED).
paths:
  /contracts:
    get:
      operationId: listContracts
      tags:
        - Contracts
      summary: List contracts (MODELED)
      description: Lists contracts in the SirionOne repository. MODELED path.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: A page of contract records.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createContract
      tags:
        - Contracts
      summary: Create a contract (MODELED)
      description: Creates a contract record. MODELED path and schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractInput'
      responses:
        '201':
          description: The created contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /contracts/{contractId}:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      operationId: getContract
      tags:
        - Contracts
      summary: Retrieve a contract (MODELED)
      responses:
        '200':
          description: The requested contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateContract
      tags:
        - Contracts
      summary: Update a contract (MODELED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractInput'
      responses:
        '200':
          description: The updated contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /contract-requests:
    get:
      operationId: listContractRequests
      tags:
        - Contract Requests
      summary: List contract requests (MODELED)
      description: >-
        Lists Contract Requests (CDRs). Confirmed conceptually by Sirion's SAP
        Ariba integration; path MODELED.
      responses:
        '200':
          description: A page of contract requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createContractRequest
      tags:
        - Contract Requests
      summary: Create a contract request (MODELED)
      description: >-
        Creates a Contract Request that drives intake / authoring workflow.
        Sirion documents event-based, asynchronous replication of CDRs. MODELED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractRequestInput'
      responses:
        '201':
          description: The created contract request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /contracts/{contractId}/metadata:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      operationId: getContractMetadata
      tags:
        - Metadata & Clauses
      summary: Get contract metadata (MODELED)
      responses:
        '200':
          description: Metadata fields for the contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateContractMetadata
      tags:
        - Metadata & Clauses
      summary: Update contract metadata (MODELED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Metadata'
      responses:
        '200':
          description: The updated metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /contracts/{contractId}/clauses:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      operationId: listContractClauses
      tags:
        - Metadata & Clauses
      summary: List AI-extracted clauses for a contract (MODELED)
      responses:
        '200':
          description: A list of extracted clauses.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Clause'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /obligations:
    get:
      operationId: listObligations
      tags:
        - Obligations
      summary: List obligations (MODELED)
      description: Lists contractual obligations and their status. MODELED path.
      parameters:
        - name: contractId
          in: query
          required: false
          description: Filter obligations by contract.
          schema:
            type: string
      responses:
        '200':
          description: A list of obligations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Obligation'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /obligations/{obligationId}:
    parameters:
      - name: obligationId
        in: path
        required: true
        description: The ID of the obligation.
        schema:
          type: string
    patch:
      operationId: updateObligation
      tags:
        - Obligations
      summary: Update obligation status (MODELED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Obligation'
      responses:
        '200':
          description: The updated obligation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Obligation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /suppliers:
    get:
      operationId: listSuppliers
      tags:
        - Suppliers
      summary: List suppliers / counterparties (MODELED)
      responses:
        '200':
          description: A list of suppliers / counterparties.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Supplier'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createSupplier
      tags:
        - Suppliers
      summary: Create a supplier / counterparty (MODELED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Supplier'
      responses:
        '201':
          description: The created supplier.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /webhooks:
    get:
      operationId: listWebhooks
      tags:
        - Webhooks
      summary: List webhook subscriptions (MODELED)
      description: >-
        Lists configured outbound webhook rules. Sirion webhook rules support
        filtering on static and custom single- and multi-select fields. MODELED
        path.
      responses:
        '200':
          description: A list of webhook subscriptions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createWebhook
      tags:
        - Webhooks
      summary: Create a webhook subscription (MODELED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Webhook'
      responses:
        '201':
          description: The created webhook subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    oauth2ClientCredentials:
      type: oauth2
      description: >-
        OAuth 2.0 client credentials grant. CONFIRMED: a Sirion tenant admin
        generates an OAuth Client Id and OAuth Client Secret under Admin 2.0 ->
        Business API & Integrations (OAuth Client Setup), used to obtain an
        access token for the Sirion B2B APIs. The token URL below is MODELED /
        tenant-specific and must be replaced with your tenant's actual token
        endpoint.
      flows:
        clientCredentials:
          tokenUrl: https://your-org.sirioncloud.com/oauth/token
          scopes: {}
  parameters:
    ContractId:
      name: contractId
      in: path
      required: true
      description: The ID of the contract (MODELED).
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: Page number for pagination (MODELED).
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Number of items per page (MODELED).
      schema:
        type: integer
        default: 25
  responses:
    Unauthorized:
      description: Missing or invalid OAuth access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ContractInput:
      type: object
      description: MODELED contract payload - not from a public reference.
      properties:
        title:
          type: string
        status:
          type: string
          description: Lifecycle status (e.g. draft, in negotiation, executed, expired).
        counterparty:
          type: string
        effectiveDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date
        value:
          type: number
        currency:
          type: string
    Contract:
      allOf:
        - $ref: '#/components/schemas/ContractInput'
        - type: object
          properties:
            id:
              type: string
            createdAt:
              type: string
              format: date-time
    ContractRequestInput:
      type: object
      description: MODELED contract request (CDR) payload.
      properties:
        title:
          type: string
        requestType:
          type: string
        counterparty:
          type: string
        requestedBy:
          type: string
        metadata:
          type: object
          additionalProperties: true
    ContractRequest:
      allOf:
        - $ref: '#/components/schemas/ContractRequestInput'
        - type: object
          properties:
            id:
              type: string
            stage:
              type: string
              description: Workflow stage of the request.
            createdAt:
              type: string
              format: date-time
    Metadata:
      type: object
      description: MODELED contract metadata field bag.
      properties:
        contractId:
          type: string
        fields:
          type: object
          additionalProperties: true
    Clause:
      type: object
      description: MODELED AI-extracted clause.
      properties:
        id:
          type: string
        type:
          type: string
        text:
          type: string
        confidence:
          type: number
    Obligation:
      type: object
      description: MODELED contractual obligation.
      properties:
        id:
          type: string
        contractId:
          type: string
        description:
          type: string
        owner:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
          description: Fulfillment status (e.g. open, met, breached).
    Supplier:
      type: object
      description: MODELED supplier / counterparty.
      properties:
        id:
          type: string
        name:
          type: string
        externalId:
          type: string
          description: Identifier in a synced procurement system (e.g. SAP Ariba).
    Webhook:
      type: object
      description: MODELED webhook subscription.
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        event:
          type: string
        filters:
          type: array
          description: Field-based filters (static or custom single/multi-select).
          items:
            type: object
            additionalProperties: true
