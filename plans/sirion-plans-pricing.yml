description: >-
  Sirion (SirionLabs) is sold as an enterprise CLM platform on a
  contact-sales / custom-contract basis. There is no public self-service pricing
  and no published API price list. Commercial terms (platform subscription,
  number of contracts / users / modules, AI capabilities, and integration /
  API access) are negotiated per customer. API access is delivered through the
  "Business API & Integrations" program under an existing enterprise agreement;
  the API is not separately metered in any publicly documented way. All specific
  amounts are unknown and MODELED as enterprise / contact-sales here.
notes: >-
  No public pricing page exists as of the review date. Verify all commercial
  terms directly with Sirion sales. This entry is intentionally not reconciled.
sources:
- https://www.sirion.ai
- https://www.sirion.ai/integrations/
